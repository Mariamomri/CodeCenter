<section class="accueil">
  <h1 [ngStyle]="{ color: couleurTitre }">Bienvenue chez CodeCenter</h1>
  <p>Centre de Formation en Développement Web</p>
  <br />

  <!-- signal -->
  <div>
    @if (inscriptionsOuvertes()) {
      <p>Les inscription sont actuellement ouvertes</p>
    }
  </div>
  <br />

  <!-- Ngstyle  -->
  <button (click)="changerCouleur()">Changer la couleur</button>

  <br /><br />
  <br /><br />
  <!-- hidden -->
  <button (click)="toggleInformations()">Afficher / Masquer</button><br />

  <section [hidden]="!afficherInformations">
    <h3>Informations administratives</h3>
    <p>Contenu bla bla</p>
  </section>
</section>
